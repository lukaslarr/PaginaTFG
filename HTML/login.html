<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Lucas Company</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a2540, #1e3a5f);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .login-container {
      background: white;
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      font-size: 2.2rem;
      font-weight: bold;
      color: #00bfff;
      margin-bottom: 30px;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #0a2540;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }
    input:focus {
      border-color: #00bfff;
      outline: none;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #00bfff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: #0099cc;
    }
    .error {
      color: red;
      text-align: center;
      margin-top: 15px;
      display: none;
    }
    .links {
      text-align: center;
      margin-top: 25px;
    }
    .links a {
      color: #00bfff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">Lucas Company</div>
    <h2>Iniciar Sesión</h2>

    <form id="loginForm">
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" id="user" required placeholder="nombre.apellido">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-login">Iniciar Sesión</button>
    </form>

    <div id="errorMessage" class="error">Usuario o contraseña incorrectos</div>

    <div class="links">
      <p>¿No tienes cuenta? <a href="#">Regístrate</a></p>
      <p><a href="index.html">Volver al Inicio</a></p>
    </div>
  </div>

  <script>

    const API_URL = "http://localhost:8000";   // ← Cambia esto si tu backend está en otro puerto o dominio

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const user = document.getElementById("user").value;
      const password = document.getElementById("password").value;

      const body = {
        nombre_usuario: user,
        contrasena: password
      }

      try {
        const res = await fetch (`${API_URL}/usuarios/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          throw new Error("Error en la autenticación");
        }

        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userEmail", user);

        alert("✅ Inicio de sesión exitoso");
        window.location.href = "index.html";
      } catch (error) {
        alert("❌ Error en el login");
        errorMsg.style.display = "block";
        setTimeout(() => errorMsg.style.display = "none", 4000);
        console.error("Error en el login:", error);
      }

    });
  </script>
</body>
</html>
