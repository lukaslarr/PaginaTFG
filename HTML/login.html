<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Lucas Company</title>
  <script src="../JS/login.js" defer></script>
  <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

  <div class="login-container">
    <div class="logo">Lucas Company</div>
    <h2>Iniciar Sesión</h2>

    <form id="loginForm">
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" id="user" required placeholder="nombre.apellido">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-login">Iniciar Sesión</button>
    </form>

    <div id="errorMessage" class="error">Usuario o contraseña incorrectos</div>

  </div>
</body>
</html>
